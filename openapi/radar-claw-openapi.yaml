openapi: 3.1.0
info:
  title: radar-claw-defender API
  version: 0.1.0
  summary: Defensive security analysis API for Radar Meseriași
  description: >
    Minimal, defensive-only API for reviewing code, routes, SQL policies, and
    product flows. It accepts only supplied review artifacts and returns
    structured findings. No endpoint performs remote execution, scanning, or
    offensive automation.
servers:
  - url: https://api.example.com
    description: Placeholder public endpoint for future deployment
security:
  - bearerAuth: []
paths:
  /analyze/code-snippet:
    post:
      operationId: analyzeCodeSnippet
      summary: Analyze a short code snippet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeSnippetRequest'
      responses:
        '200':
          description: Structured analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
  /analyze/file:
    post:
      operationId: analyzeFile
      summary: Analyze a file artifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileRequest'
      responses:
        '200':
          description: Structured analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
  /analyze/route:
    post:
      operationId: analyzeRoute
      summary: Analyze a route handler and its trust boundaries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteRequest'
      responses:
        '200':
          description: Structured analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
  /analyze/sql-policy:
    post:
      operationId: analyzeSqlPolicy
      summary: Analyze SQL or RLS policy text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SqlPolicyRequest'
      responses:
        '200':
          description: Structured analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
  /threat-model/flow:
    post:
      operationId: threatModelFlow
      summary: Threat-model a product flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreatModelRequest'
      responses:
        '200':
          description: Structured threat model result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
  /summarize/finding:
    post:
      operationId: summarizeFinding
      summary: Rewrite a finding for a target audience
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeFindingRequest'
      responses:
        '200':
          description: Summary output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    AnalyzerName:
      type: string
      enum:
        - auth-bypass
        - authorization-idor
        - rls-alignment
        - admin-boundary
        - otp-abuse
        - webhook-verification
        - xss-rendering
        - data-exposure
        - rate-limiting
        - input-validation
    OutputMode:
      type: string
      enum: [markdown, json]
    Severity:
      type: string
      enum: [critical, high, medium, low, info]
    AnalysisConfig:
      type: object
      properties:
        minimumSeverity:
          $ref: '#/components/schemas/Severity'
        enabledAnalyzers:
          type: array
          items:
            $ref: '#/components/schemas/AnalyzerName'
        outputMode:
          $ref: '#/components/schemas/OutputMode'
        productContextOverrides:
          type: object
          additionalProperties: true
    Finding:
      type: object
      required:
        - finding
        - severity
        - affected_area
        - preconditions
        - why_it_matters
        - evidence
        - recommended_fix
        - regression_test_idea
      properties:
        finding:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        affected_area:
          type: string
        preconditions:
          type: array
          items:
            type: string
        why_it_matters:
          type: string
        evidence:
          type: array
          items:
            type: string
        recommended_fix:
          type: array
          items:
            type: string
        regression_test_idea:
          type: string
    AnalysisSummary:
      type: object
      required: [totalFindings, bySeverity]
      properties:
        totalFindings:
          type: integer
          minimum: 0
        bySeverity:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
    AnalysisResponse:
      type: object
      required: [request_id, mode, summary, findings, unverified]
      properties:
        request_id:
          type: string
        mode:
          $ref: '#/components/schemas/OutputMode'
        summary:
          $ref: '#/components/schemas/AnalysisSummary'
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        unverified:
          type: array
          items:
            type: string
    CodeSnippetRequest:
      type: object
      required: [snippet]
      properties:
        language:
          type: string
        path:
          type: string
        snippet:
          type: string
        notes:
          type: string
        config:
          $ref: '#/components/schemas/AnalysisConfig'
    FileRequest:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        language:
          type: string
        content:
          type: string
        notes:
          type: string
        config:
          $ref: '#/components/schemas/AnalysisConfig'
    RouteRequest:
      type: object
      required: [method, path, handler]
      properties:
        method:
          type: string
        path:
          type: string
        handler:
          type: string
        surroundingContext:
          type: string
        config:
          $ref: '#/components/schemas/AnalysisConfig'
    SqlPolicyRequest:
      type: object
      required: [sql]
      properties:
        table:
          type: string
        policyName:
          type: string
        sql:
          type: string
        config:
          $ref: '#/components/schemas/AnalysisConfig'
    ThreatModelRequest:
      type: object
      required: [flowName, actors, assets, steps]
      properties:
        flowName:
          type: string
        actors:
          type: array
          items:
            type: string
        assets:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            type: string
        trustBoundaries:
          type: array
          items:
            type: string
        assumptions:
          type: array
          items:
            type: string
        config:
          $ref: '#/components/schemas/AnalysisConfig'
    SummarizeFindingRequest:
      type: object
      required: [finding, audience]
      properties:
        audience:
          type: string
          enum: [engineer, founder, support, auditor]
        finding:
          $ref: '#/components/schemas/Finding'
    SummaryResponse:
      type: object
      required: [summary]
      properties:
        summary:
          type: string
